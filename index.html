<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestra Boda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <button id="musicBtn" class="music-btn" aria-label="Controlar música">♫</button>

  <header class="hero-section">
    <h1>¡Nos Casamos!</h1>
    <div id="countdown" class="countdown-container">
      <div><strong id="days">00</strong><span>Días</span></div>
      <div><strong id="hours">00</strong><span>Horas</span></div>
      <div><strong id="minutes">00</strong><span>Minutos</span></div>
      <div><strong id="seconds">00</strong><span>Segundos</span></div>
    </div>
  </header>

  <section class="gallery-section">
    <h2>Álbum en Vivo de los Invitados</h2>
    
    <div class="event-carousel">
      <button class="carousel-arrow prev" id="prevBtn" aria-label="Anterior">❮</button>
      <button class="carousel-arrow next" id="nextBtn" aria-label="Siguiente">❯</button>

      <div class="carousel-track" id="carouselTrack">
        </div>
    </div>

    <div class="upload-container">
      <h3>¿Tienes fotos del momento? ¡Súbelas aquí!</h3>
      <form id="uploadPhotoForm">
        <label for="eventPhoto" class="custom-file-upload">Seleccionar Fotografía</label>
        <input type="file" id="eventPhoto" accept="image/*">
        
        <div class="preview-box">
          <img id="photoPreview" src="" alt="Vista previa" class="hidden">
        </div>

        <button type="submit" id="uploadBtn">Subir fotografía</button>
      </form>
      <div id="uploadMessage" class="form-message"></div>
    </div>
  </section>

  <section class="rsvp-section">
    <h2>Confirmación de Asistencia</h2>
    <form id="rsvpForm">
      <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>
      
      <div class="form-group">
        <label for="apellidos">Apellidos:</label>
        <input type="text" id="apellidos" name="apellidos" required>
      </div>

      <div class="form-group">
        <label for="asiste">¿Asistirás a la boda?</label>
        <select id="asiste" name="asiste" required>
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="Sí">Sí, ¡allí estaré!</option>
          <option value="No">No, me es imposible</option>
        </select>
      </div>

      <div id="extraFields" class="hidden">
        <div class="form-group">
          <label for="telefono">Teléfono de contacto:</label>
          <input type="tel" id="telefono" name="telefono">
        </div>

        <div class="form-group">
          <label for="alergias">Alergias o restricciones alimentarias:</label>
          <input type="text" id="alergias" name="alergias" placeholder="Ej: Celíaco, Vegano, sin frutos secos...">
        </div>

        <div class="form-group">
          <label for="autobus">¿Necesitas plaza en el autobús?</label>
          <select id="autobus" name="autobus">
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Sí">Sí</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submitBtn">Enviar confirmación</button>
      <div id="formMessage" class="form-message"></div>
    </form>
  </section>

  <script>
    window.RSVP_ENDPOINT = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUÍ";
  </script>
  <script src="script.js"></script>
</body>
</html>
